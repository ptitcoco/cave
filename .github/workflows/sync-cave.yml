name: sync-cave
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Recuperer le dernier JSON depuis Drive
        env:
          KEY: ${{ secrets.DRIVE_API_KEY }}
          FOLDER: "1AQuijdIb7gN1tZ56L9QHLF_e9B97hes9"
        run: |
          set -euo pipefail
          LIST=$(curl -sf "https://www.googleapis.com/drive/v3/files?q='${FOLDER}'+in+parents+and+trashed=false&fields=files(id,name)&pageSize=1000&key=${KEY}")
          PICK=$(echo "$LIST" | jq -c '[ .files[] | select(.name | test("ma-cave-.*[0-9]{4}-[0-9]{2}-[0-9]{2}\\.json$")) | . + { d: (.name | capture("(?<d>[0-9]{4}-[0-9]{2}-[0-9]{2})").d) } ] | sort_by(.d) | last // empty')
          if [ -z "$PICK" ]; then
            echo "::error::Aucun fichier ma-cave-*AAAA-MM-JJ.json trouve (dossier public ? cle valide ?)"; exit 1
          fi
          ID=$(echo "$PICK" | jq -r '.id')
          NAME=$(echo "$PICK" | jq -r '.name')
          echo "Dernier : $NAME"
          curl -sfL "https://www.googleapis.com/drive/v3/files/${ID}?alt=media&key=${KEY}" -o cave-data.json
          jq empty cave-data.json

      - name: Commit si modifie
        run: |
          set -e
          git config user.name "cave-bot"
          git config user.email "cave-bot@users.noreply.github.com"
          git add cave-data.json
          if git diff --cached --quiet; then
            echo "Aucun changement."
          else
            git commit -m "sync: cave-data.json $(date -u +%F)"
            git push
          fi
